// ─── Helpers ──────────────────────────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));
const esc   = s  => String(s || "")
  .replace(/&/g,"&amp;").replace(/</g,"&lt;")
  .replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ─── Fetch course data from local Coda proxy server ──────────────────────────
// The proxy server (server.js) calls Coda's REST API directly with proper auth.
// No model in the loop — no truncation, no hallucination, no timeouts.
const PROXY_URL = "https://coda-exporter.onrender.com"; // Render deployed server

async function fetchCourseData(docId, courseCode, courseName, onDebug) {
  onDebug("Connecting to Coda proxy server…");

  const resp = await fetch(`${PROXY_URL}/api/course`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ docId, courseCode, courseName }),
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ error: `HTTP ${resp.status}` }));
    throw new Error(err.error || `Server error: ${resp.status}`);
  }

  const data = await resp.json();
  if (data.error) throw new Error(data.error);

  onDebug(`Got: ${data.courseCode} — ${data.courseName}. ${(data.competencies || []).length} competencies. Building document…`);

  return data;
}

// ─── DOCX generation (pure in-memory XML + ZIP) ───────────────────────────────

// ── XML escape ────────────────────────────────────────────────────────────────
function esc2(s) {
  return String(s || "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── relMap: tracks hyperlink relationships, seeded after rId1(styles)+rId2(numbering)
function makeRelMap() { return { nextId: 3, rels: [] }; }

// ── Produces a clickable w:hyperlink element with a registered relationship
// Defensive: if relMap is missing, falls back to plain blue text
function xmlHyperlink(displayText, url, relMap) {
  if (!relMap) return xmlRun(displayText, { color: "0563C1", underline: true });
  const rId = "rId" + relMap.nextId++;
  relMap.rels.push({ rId, url });
  // xmlns:r is declared once on <w:document> root — do NOT redeclare inline or Word chokes
  return `<w:hyperlink r:id="${rId}"><w:r><w:rPr><w:rStyle w:val="Hyperlink"/><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="18"/><w:szCs w:val="18"/></w:rPr><w:t xml:space="preserve">${esc2(displayText)}</w:t></w:r></w:hyperlink>`;
}

// ── Builds the rels XML including all hyperlinks collected during generation
function buildRelsXml(relMap) {
  const hlRels = relMap.rels.map(r =>
    `<Relationship Id="${r.rId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/hyperlink" Target="${esc2(r.url)}" TargetMode="External"/>`
  ).join("");
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/numbering" Target="numbering.xml"/>${hlRels}</Relationships>`;
}

// ── Plain text → runs, detecting [text](url) markdown and bare https:// URLs
function inlineToRuns(text, runOpts, relMap) {
  const re = /\[([^\]]+)\]\((https?:\/\/[^)]+)\)|(https?:\/\/\S+)/g;
  let result = "", last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) result += xmlRun(text.slice(last, m.index), runOpts);
    result += m[1] ? xmlHyperlink(m[1], m[2], relMap) : xmlHyperlink(m[3], m[3], relMap);
    last = m.index + m[0].length;
  }
  if (last < text.length) result += xmlRun(text.slice(last), runOpts);
  return result || xmlRun(text, runOpts);
}

// ── Base run element
function xmlRun(text, {bold=false,color="000000",size=18,italic=false,underline=false}={}) {
  const b = bold      ? "<w:b/><w:bCs/>"        : "";
  const i = italic    ? "<w:i/><w:iCs/>"         : "";
  const u = underline ? '<w:u w:val="single"/>'  : "";
  return `<w:r><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="${size}"/><w:szCs w:val="${size}"/>${b}${i}${u}<w:color w:val="${color}"/></w:rPr><w:t xml:space="preserve">${esc2(text)}</w:t></w:r>`;
}

// ── Paragraph element
function xmlPara(runs, {bullet=false}={}) {
  const np = bullet ? `<w:numPr><w:ilvl w:val="0"/><w:numId w:val="1"/></w:numPr>` : "";
  return `<w:p><w:pPr>${np}<w:spacing w:after="40"/><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="18"/><w:szCs w:val="18"/></w:rPr></w:pPr>${runs}</w:p>`;
}

// ── Full slate → XML, with hyperlink support via relMap
function slateXml(slate, relMap) {
  if (!slate) return xmlPara(xmlRun(""));

  // Plain string: scan each line for inline hyperlinks
  if (typeof slate === "string") {
    const lines = slate.split("\n").map(l => l.trim()).filter(l => l);
    if (!lines.length) return xmlPara(xmlRun(""));
    return lines.map(l => xmlPara(inlineToRuns(l, {}, relMap))).join("");
  }

  const root  = slate.root || slate;
  const lines = root.children || [];
  if (!lines.length) return xmlPara(xmlRun(""));

  return lines.map(line => {
    const isBullet = line.style === "BulletedList";
    const children = line.children || [];

    // Build runs for this line
    const runs = children.map(child => {
      // InlineStructuredValue = Coda hyperlink (urlref type)
      if (child.type === "InlineStructuredValue") {
        const v   = child.value || {};
        const url = v.url  || null;
        const nm  = v.name || v.url || "";
        if (url && nm) return xmlHyperlink(nm, url, relMap);
        return nm ? xmlRun(nm) : "";
      }

      const text = child.text || "";
      if (!text) return "";

      const runOpts = { bold: !!child.bold, italic: !!child.italic, underline: !!child.underline };

      // Check for inline plain-text URLs within this run segment
      if (!child.bold && (text.includes("https://") || text.includes("http://"))) {
        return inlineToRuns(text, runOpts, relMap);
      }

      // Bold-before-colon: if not already bold and text contains ": ",
      // split so everything up to and including the colon is bold
      // e.g. "Domain 1: (Knowledge..." → bold "Domain 1:" + normal " (Knowledge..."
      // e.g. "Competency 1.1 Demonstrate..." stays as-is (no colon-space pattern)
      if (!child.bold && !child.italic) {
        const colonIdx = text.indexOf(": ");
        if (colonIdx > 0 && colonIdx < text.length - 2) {
          const boldPart  = text.slice(0, colonIdx + 1); // up to and including ":"
          const restPart  = text.slice(colonIdx + 1);    // " rest of text"
          return xmlRun(boldPart, { bold: true }) + xmlRun(restPart, runOpts);
        }
      }

      return xmlRun(text, runOpts);
    }).join("");

    // Some slate paragraphs embed \n within a single text child (AACN domain blocks)
    // These already emit as separate line objects from Coda, so just wrap normally
    if (!runs) return xmlPara(xmlRun(""));
    return xmlPara(runs, { bullet: isBullet });
  }).join("") || xmlPara(xmlRun(""));
}

// ── Parse comp title field (may be slate object or plain string)
function parseTitle(raw) {
  let t = "";
  if (raw && typeof raw === "object" && raw.root) {
    t = (raw.root.children || [])
      .flatMap(l => (l.children || []).map(c => c.text || ""))
      .join("").trim();
  } else {
    t = String(raw || "").trim();
  }
  const m = t.match(/^(.+?)\.\s{1,2}(The learner.+)$/s);
  return m ? { title: m[1].trim(), statement: m[2].trim() } : { title: t, statement: "" };
}

// ── Parse skill name "Category\nTitle\nStatement" into 3 separate parts
function parseSk(name) {
  const p = String(name || "").split("\n").map(s => s.trim()).filter(Boolean);
  return { category: p[0] || "", title: p[1] || "", statement: p[2] || "" };
}

function buildDocxXml(data, relMap) {
  const {
    courseCode="", courseName="", modality="", status="",
    creditUnits="", scopeNotes, assessmentModalityRationale="",
    evidence, lrStrategy, tools, ccts=[], pos=[], competencies=[]
  } = data;

  const sorted = [...competencies].sort((a,b) => (a.order||0)-(b.order||0));

  const HDR="1F4E79", SUB="2E75B6", LGT="D6E4F0", GRD="F2F7FB", WHT="FFFFFF";
  const CW=14400, LW=2200, DW=12200, SC=2880, ST=4320, SS=7200;

  const cell = (content, {w=7200,fill=null,colspan=1}={}) => {
    const shd = fill ? `<w:shd w:val="clear" w:color="auto" w:fill="${fill}"/>` : "";
    const gs  = colspan>1 ? `<w:gridSpan w:val="${colspan}"/>` : "";
    return `<w:tc><w:tcPr><w:tcW w:w="${w}" w:type="dxa"/>${gs}${shd}<w:vAlign w:val="top"/><w:tcMar><w:top w:w="80" w:type="dxa"/><w:bottom w:w="80" w:type="dxa"/><w:left w:w="120" w:type="dxa"/><w:right w:w="120" w:type="dxa"/></w:tcMar></w:tcPr>${content}</w:tc>`;
  };

  const trow = (...cells) => `<w:tr>${cells.join("")}</w:tr>`;

  const tbl = (rows, widths) => {
    const total = widths.reduce((a,b)=>a+b,0);
    const grid  = widths.map(w=>`<w:gridCol w:w="${w}"/>`).join("");
    return `<w:tbl><w:tblPr><w:tblW w:w="${total}" w:type="dxa"/><w:tblBorders><w:top w:val="single" w:sz="4" w:color="9DC3E6"/><w:left w:val="single" w:sz="4" w:color="9DC3E6"/><w:bottom w:val="single" w:sz="4" w:color="9DC3E6"/><w:right w:val="single" w:sz="4" w:color="9DC3E6"/><w:insideH w:val="single" w:sz="4" w:color="9DC3E6"/><w:insideV w:val="single" w:sz="4" w:color="9DC3E6"/></w:tblBorders></w:tblPr><w:tblGrid>${grid}</w:tblGrid>${rows.join("")}</w:tbl>`;
  };

  const hdrRow   = (text,cs,tw) => trow(cell(xmlPara(xmlRun(text,{bold:true,color:WHT,size:18})),{w:tw,fill:HDR,colspan:cs}));
  const banRow3  = text          => trow(cell(xmlPara(xmlRun(text,{bold:true,color:"1F4E79",size:18})),{w:CW,fill:LGT,colspan:3}));
  const labelRow = (lbl,xml)     => trow(
    cell(xmlPara(xmlRun(lbl,{bold:true,color:"1F4E79",size:18})),{w:LW,fill:LGT}),
    cell(xml,{w:DW})
  );
  const labelRow3 = (lbl,xml)    => trow(
    cell(xmlPara(xmlRun(lbl,{bold:true,color:"1F4E79",size:18})),{w:LW,fill:LGT}),
    cell(xml,{w:DW,colspan:2})
  );

  const body = [];

  // Title block
  body.push(xmlPara(xmlRun(`${courseCode} – ${courseName}`,{bold:true,color:HDR,size:28})));
  body.push(xmlPara(xmlRun(`Modality: ${modality}  |  Status: ${status}  |  Credit Units: ${creditUnits}`,{color:"444444",size:20})));
  body.push(xmlPara(xmlRun("")));

  // Course Level Scope Notes — full slate, may be very long with bullets, AACN domains etc.
  body.push(tbl([
    hdrRow("Course Level Scope Notes",2,CW),
    labelRow("Scope Notes", slateXml(scopeNotes, relMap)),
  ],[LW,DW]));
  body.push(xmlPara(xmlRun("")));

  // Course Level Assessment Strategy
  // Modality Rationale is plain text with \n separators
  const asmtParas = (assessmentModalityRationale||"").split("\n")
    .filter(l=>l.trim())
    .map(l => xmlPara(inlineToRuns(l.trim(), {}, relMap)))
    .join("");
  body.push(tbl([
    hdrRow("Course Level Assessment Strategy",2,CW),
    labelRow("Modality Rationale", asmtParas || xmlPara(xmlRun(""))),
    labelRow("Evidence", slateXml(evidence, relMap)),
  ],[LW,DW]));
  body.push(xmlPara(xmlRun("")));

  // LR Strategy — slate with hyperlinks to SharePoint, LibGuides, EBSCO etc.
  body.push(tbl([
    hdrRow("Course Level LR Strategy",2,CW),
    labelRow("LR Strategy", slateXml(lrStrategy, relMap)),
  ],[LW,DW]));
  body.push(xmlPara(xmlRun("")));

  // Tools & Technologies
  body.push(tbl([
    hdrRow("Course Level Critical Tools and Technologies",2,CW),
    labelRow("Tools & Technologies", slateXml(tools, relMap)),
  ],[LW,DW]));
  body.push(xmlPara(xmlRun("")));

  // Cross Cutting Themes — only emitted when there's data
  if (ccts && ccts.length) {
    // widths: Theme | Description | Aligned
    const CW_T = 3600, CW_D = 9000, CW_A = 1800;
    const cctRows = [
      trow(cell(xmlPara(xmlRun("Course Level Cross Cutting Themes",{bold:true,color:WHT,size:18})),{w:CW,fill:HDR,colspan:3})),
      trow(
        cell(xmlPara(xmlRun("Cross Cutting Theme",{bold:true,color:WHT,size:18})),{w:CW_T,fill:SUB}),
        cell(xmlPara(xmlRun("Description",{bold:true,color:WHT,size:18})),{w:CW_D,fill:SUB}),
        cell(xmlPara(xmlRun("Aligned",{bold:true,color:WHT,size:18})),{w:CW_A,fill:SUB}),
      ),
      ...ccts.map(c => trow(
        cell(xmlPara(xmlRun(c.name||"",{size:18})),{w:CW_T,fill:GRD}),
        cell(xmlPara(xmlRun(c.description||"",{size:18})),{w:CW_D}),
        cell(xmlPara(xmlRun(c.aligned||"",{bold:true,size:18})),{w:CW_A}),
      )),
    ];
    body.push(tbl(cctRows, [CW_T, CW_D, CW_A]));
    body.push(xmlPara(xmlRun("")));
  }

  // Program Outcomes — only emitted when there's data
  if (pos && pos.length) {
    // widths: Name | Aligned
    const PW_N = 12600, PW_A = 1800;
    const poRows = [
      trow(cell(xmlPara(xmlRun("Course Level Program Outcomes",{bold:true,color:WHT,size:18})),{w:CW,fill:HDR,colspan:2})),
      trow(
        cell(xmlPara(xmlRun("Program Outcome",{bold:true,color:WHT,size:18})),{w:PW_N,fill:SUB}),
        cell(xmlPara(xmlRun("Aligned",{bold:true,color:WHT,size:18})),{w:PW_A,fill:SUB}),
      ),
      ...pos.map(p => trow(
        cell(xmlPara(xmlRun(p.name||"",{size:18})),{w:PW_N,fill:GRD}),
        cell(xmlPara(xmlRun(p.aligned||"",{bold:true,size:18})),{w:PW_A}),
      )),
    ];
    body.push(tbl(poRows, [PW_N, PW_A]));
    body.push(xmlPara(xmlRun("")));
  }

  // Section heading
  body.push(xmlPara(xmlRun("Course Competencies and Context Tables",{bold:true,color:HDR,size:24})));
  body.push(xmlPara(xmlRun("")));

  // One table per competency
  sorted.forEach((comp, idx) => {
    const { title, statement } = parseTitle(comp.titleRaw);
    // Skills: MUST split into 3 separate cells — category | title | statement
    const skills = (comp.skills || []).map(s => parseSk(s.name));
    const ht = `Competency ${idx+1} | Title: ${title} | Statement: ${statement} | Target Level: ${comp.level||""}`;

    const rows = [
      // Header row
      trow(cell(xmlPara(xmlRun(ht,{bold:true,color:WHT,size:18})),{w:CW,fill:HDR,colspan:3})),
      // Skills banner
      banRow3("Skills"),
      // Skills column headers
      trow(
        cell(xmlPara(xmlRun("Skill Category",{bold:true,color:WHT,size:18})),{w:SC,fill:SUB}),
        cell(xmlPara(xmlRun("Skill Title",{bold:true,color:WHT,size:18})),{w:ST,fill:SUB}),
        cell(xmlPara(xmlRun("Skill Statement",{bold:true,color:WHT,size:18})),{w:SS,fill:SUB}),
      ),
      // One row per skill — 3 SEPARATE cells, never merged
      ...skills.map(sk => trow(
        cell(xmlPara(xmlRun(sk.category,{size:18})),{w:SC,fill:GRD}),
        cell(xmlPara(xmlRun(sk.title,   {size:18})),{w:ST}),
        cell(xmlPara(xmlRun(sk.statement,{size:18})),{w:SS}),
      )),
      // Competency Detail banner
      banRow3("Competency Detail"),
      // Assessment recommendations
      labelRow3("Assessment Recommendations",
        xmlPara(xmlRun(`Modality: ${comp.modality||""}`,{bold:true,size:18})) +
        xmlPara(xmlRun(`Rationale: ${comp.rationale||""}`,{size:18})) +
        xmlPara(xmlRun(`Evidence: ${comp.evidence||""}`,{size:18}))
      ),
      // Additional Scope Notes
      labelRow3("Additional Scope Notes and Requirements",
        comp.scopeNotes
          ? xmlPara(inlineToRuns(comp.scopeNotes, {size:18}, relMap))
          : xmlPara(xmlRun(""))
      ),
      // Standards Alignment — slate with AACN Essentials bullets
      labelRow3("Standards Alignment", slateXml(comp.standards, relMap)),
    ];

    body.push(tbl(rows, [SC, ST, SS]));
    if (idx < sorted.length - 1) body.push(xmlPara(xmlRun("")));
  });

  const docNs = [
    'xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"',
    'xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"',
    'xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing"',
  ].join(" ");

  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:document ${docNs}><w:body>${body.join("")}<w:sectPr><w:pgSz w:w="15840" w:h="12240" w:orient="landscape"/><w:pgMar w:top="1080" w:right="720" w:bottom="720" w:left="720" w:header="360" w:footer="720" w:gutter="0"/></w:sectPr></w:body></w:document>`;
}

function crc32(data) {
  let crc=0xFFFFFFFF;
  for(let i=0;i<data.length;i++){crc^=data[i];for(let j=0;j<8;j++)crc=(crc>>>1)^(crc&1?0xEDB88320:0);}
  return (crc^0xFFFFFFFF)>>>0;
}
function dosDateTime() {
  const d=new Date();
  return {date:((d.getFullYear()-1980)<<9)|((d.getMonth()+1)<<5)|d.getDate(),time:(d.getHours()<<11)|(d.getMinutes()<<5)|(d.getSeconds()>>1)};
}
function buildZip(files) {
  const enc=new TextEncoder();
  const entries=[];
  let offset=0;
  for(const [name,content] of Object.entries(files)){
    const nb=enc.encode(name),db=enc.encode(content);
    const crc=crc32(db),now=dosDateTime();
    entries.push({nb,db,crc,size:db.length,offset,...now});
    offset+=30+nb.length+db.length;
  }
  const parts=[];
  for(const e of entries){
    const lh=new Uint8Array(30+e.nb.length),lv=new DataView(lh.buffer);
    lv.setUint32(0,0x04034b50,true);lv.setUint16(4,20,true);lv.setUint16(6,0,true);lv.setUint16(8,0,true);
    lv.setUint16(10,e.time,true);lv.setUint16(12,e.date,true);lv.setUint32(14,e.crc,true);
    lv.setUint32(18,e.size,true);lv.setUint32(22,e.size,true);lv.setUint16(26,e.nb.length,true);lv.setUint16(28,0,true);
    lh.set(e.nb,30);parts.push(lh,e.db);
  }
  const cdOff=offset;
  for(const e of entries){
    const cd=new Uint8Array(46+e.nb.length),cv=new DataView(cd.buffer);
    cv.setUint32(0,0x02014b50,true);cv.setUint16(4,20,true);cv.setUint16(6,20,true);
    cv.setUint16(8,0,true);cv.setUint16(10,0,true);cv.setUint16(12,e.time,true);cv.setUint16(14,e.date,true);
    cv.setUint32(16,e.crc,true);cv.setUint32(20,e.size,true);cv.setUint32(24,e.size,true);
    cv.setUint16(28,e.nb.length,true);cv.setUint16(30,0,true);cv.setUint16(32,0,true);
    cv.setUint16(34,0,true);cv.setUint16(36,0,true);cv.setUint32(38,0,true);cv.setUint32(42,e.offset,true);
    cd.set(e.nb,46);parts.push(cd);offset+=cd.length;
  }
  const cdSize=offset-cdOff;
  const eocd=new Uint8Array(22),ev=new DataView(eocd.buffer);
  ev.setUint32(0,0x06054b50,true);ev.setUint16(4,0,true);ev.setUint16(6,0,true);
  ev.setUint16(8,entries.length,true);ev.setUint16(10,entries.length,true);
  ev.setUint32(12,cdSize,true);ev.setUint32(16,cdOff,true);ev.setUint16(20,0,true);
  parts.push(eocd);
  const total=parts.reduce((a,b)=>a+b.length,0);
  const result=new Uint8Array(total);let pos=0;
  for(const p of parts){result.set(p,pos);pos+=p.length;}
  return result;
}

function makeDocx(data) {
  // relMap must be created ONCE and passed through all XML builders
  // so every hyperlink gets a unique rId registered in the rels file
  const relMap = makeRelMap();
  const docXml = buildDocxXml(data, relMap);

  return buildZip({
    "[Content_Types].xml": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/><Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/><Override PartName="/word/numbering.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.numbering+xml"/></Types>`,
    "_rels/.rels": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`,
    "word/document.xml": docXml,
    "word/styles.xml": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:docDefaults><w:rPrDefault><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="18"/><w:szCs w:val="18"/></w:rPr></w:rPrDefault></w:docDefaults><w:style w:type="character" w:styleId="Hyperlink"><w:name w:val="Hyperlink"/><w:rPr><w:color w:val="0563C1"/><w:u w:val="single"/></w:rPr></w:style></w:styles>`,
    "word/numbering.xml": `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:numbering xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:abstractNum w:abstractNumId="0"><w:lvl w:ilvl="0"><w:start w:val="1"/><w:numFmt w:val="bullet"/><w:lvlText w:val="&#x2022;"/><w:lvlJc w:val="left"/><w:pPr><w:ind w:left="540" w:hanging="270"/></w:pPr></w:lvl></w:abstractNum><w:num w:numId="1"><w:abstractNumId w:val="0"/></w:num></w:numbering>`,
    // Dynamic rels — includes all hyperlinks discovered during XML generation
    "word/_rels/document.xml.rels": buildRelsXml(relMap),
  });
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [docId,      setDocId]      = useState("4YIajnJqvo");
  const [docType,    setDocType]    = useState("CCW");
  const [phase,      setPhase]      = useState("idle");
  const [stepIdx,    setStepIdx]    = useState(-1);
  const [errMsg,     setErrMsg]     = useState("");
  const [docxBytes,  setDocxBytes]  = useState(null);
  const [filename,   setFilename]   = useState("");
  const [saved,      setSaved]      = useState(false);
  const [debugLog,   setDebugLog]   = useState([]);
  const [showDebug,  setShowDebug]  = useState(false);
  // Program list (PDOW + future filtered course picker). Loaded once on mount
  // from /api/programs; the dropdown shows abbreviations (MSCSIA, MSCIN, …)
  // since those are the canonical user-facing handles internally.
  const [programs,        setPrograms]        = useState([]);
  const [programsLoading, setProgramsLoading] = useState(true);
  const [programsErr,     setProgramsErr]     = useState("");
  const [programAbbr,     setProgramAbbr]     = useState("");

  // Courses for the selected program. Re-fetched every time programAbbr
  // changes; selection is cleared on program change so the user doesn't carry
  // a course from a different program.
  const [courses,        setCourses]        = useState([]);
  const [coursesLoading, setCoursesLoading] = useState(false);
  const [coursesErr,     setCoursesErr]     = useState("");
  const [courseId,       setCourseId]       = useState("");

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const resp = await fetch(`${PROXY_URL}/api/programs`);
        const body = await resp.json().catch(() => null);
        if (!resp.ok) {
          const msg = body?.error || `HTTP ${resp.status}`;
          throw new Error(msg);
        }
        if (!cancelled) {
          setPrograms(body?.programs || []);
          setProgramsLoading(false);
        }
      } catch (err) {
        if (!cancelled) {
          setProgramsErr(err.message);
          setProgramsLoading(false);
        }
      }
    })();
    return () => { cancelled = true; };
  }, []);

  // Fetch courses whenever the program selection changes. Deliberately clears
  // any prior course selection — a course from one program wouldn't be valid
  // for another, and the junction row IDs differ per program.
  useEffect(() => {
    setCourseId("");
    setCourses([]);
    setCoursesErr("");
    if (!programAbbr) {
      setCoursesLoading(false);
      return;
    }
    let cancelled = false;
    setCoursesLoading(true);
    (async () => {
      try {
        const resp = await fetch(`${PROXY_URL}/api/courses?programAbbr=${encodeURIComponent(programAbbr)}`);
        const body = await resp.json().catch(() => null);
        if (!resp.ok) {
          const msg = body?.error || `HTTP ${resp.status}`;
          throw new Error(msg);
        }
        if (!cancelled) {
          setCourses(body?.courses || []);
          setCoursesLoading(false);
        }
      } catch (err) {
        if (!cancelled) {
          setCoursesErr(err.message);
          setCoursesLoading(false);
        }
      }
    })();
    return () => { cancelled = true; };
  }, [programAbbr]);

  const effDocId  = docId.trim() || "4YIajnJqvo";
  const docCustom = docId.trim() && docId.trim() !== "4YIajnJqvo";

  // Selected course object (or null). All downstream displays + the CCW
  // fetch key off this — cleanCode/cleanName are preserved as names because
  // the existing DOCX builder and confirm summary reference them.
  const selectedCourse = courses.find(c => c.progCourseId === courseId) || null;
  const cleanCode = selectedCourse?.code || "";
  const cleanName = selectedCourse?.name || "";
  const primary   = cleanCode;
  const hasInput  = !!selectedCourse;
  const fname     = (primary || "COURSE") + "_" + docType + ".docx";

  const showConfirm = hasInput && phase === "idle";
  const canExport   = hasInput && phase !== "running";

  // Course-name-sorted view of the same list — used by the second dropdown so
  // users navigating by title get an alphabetical list without disturbing the
  // code-sorted primary dropdown.
  const coursesByName = [...courses].sort((a, b) => (a.name || "").localeCompare(b.name || ""));

  const pct = stepIdx < 0 ? 0 : Math.round((stepIdx / (STEPS.length - 1)) * 100);

  function clearStatus() {
    setPhase("idle"); setStepIdx(-1); setErrMsg("");
    setDocxBytes(null); setFilename(""); setSaved(false);
    setDebugLog([]);
  }

  function addDebug(msg) {
    setDebugLog(prev => [...prev, `[${new Date().toLocaleTimeString()}] ${msg}`]);
  }

  // Drives stepIdx from real progress events — never auto-advances on a timer.
  // On error, deliberately leaves stepIdx where it was so the failed step stays
  // lit in the (briefly visible) progress card and the err-box explains why.
  const doExport = useCallback(async () => {
    if (!canExport) return;
    clearStatus();
    setPhase("running");

    try {
      setStepIdx(0); // Connecting to Coda
      await sleep(150);

      setStepIdx(1); // Looking up course (held throughout the proxy POST)
      const courseData = await fetchCourseData(effDocId, primary, cleanName, addDebug);

      if (courseData.error) throw new Error(courseData.error);

      setStepIdx(2); // Building document
      await sleep(150);

      const bytes = makeDocx(courseData);
      const outName = (courseData.courseCode || primary || "COURSE").trim().replace(/\s+/g,"") + "_" + docType + ".docx";

      setStepIdx(3); // Ready
      await sleep(200);

      setDocxBytes(bytes);
      setFilename(outName);
      setPhase("done");

    } catch(err) {
      setErrMsg(err.message || "Unexpected error. Please try again.");
      setPhase("error");
    }
  }, [canExport, effDocId, primary, cleanName, docType]);

  function doSave() {
    if (!docxBytes || saved) return;
    const blob = new Blob([docxBytes], {type:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setSaved(true);
  }

  const confirmRows = showConfirm ? [
    ["Doc",    `Design & Development V3 (${effDocId})`],
    ["Course", cleanCode+(cleanName?` – ${cleanName.length>50?cleanName.slice(0,50)+"…":cleanName}`:"")],
    ["Type",   `${docType} (Course Competency Worksheet)`],
    ["Output", fname],
  ] : null;

  return (
    <>
      <style>{css}</style>
      <div className="shell">

        {/* Header */}
        <div className="glass-hdr">
          <WGUOwl/>
          <div>
            <div className="hdr-title">WGU Doc Exporter</div>
            <div className="hdr-sub">Design &amp; Development V3 · WGU</div>
          </div>
        </div>

        {/* Coda connection */}
        <div className="card">
          <div className="clabel">Coda connection</div>
          <div className="field">
            <label htmlFor="docid">Doc ID</label>
            <div className="irow">
              <input type="text" id="docid" value={docId} placeholder="4YIajnJqvo"
                onChange={e=>{setDocId(e.target.value);clearStatus();}}
                className={docCustom?"ok":""}/>
              <span className={`pill ${docCustom?"pill-b":"pill-g"}`}>{docCustom?"Custom":"Default"}</span>
            </div>
            <span className="hint">Leave as-is for Design &amp; Development V3</span>
          </div>
        </div>

        {/* Program */}
        <div className="card">
          <div className="clabel">Program</div>
          <div className="field">
            <label htmlFor="prog">Program</label>
            <select id="prog"
              value={programAbbr}
              disabled={programsLoading || !!programsErr}
              onChange={e => { setProgramAbbr(e.target.value); clearStatus(); }}
              className={programAbbr ? "ok" : ""}>
              <option value="">{programsLoading ? "Loading programs…" : programsErr ? "Failed to load" : "— Select —"}</option>
              {programs.map(p => (
                <option key={p.abbr} value={p.abbr}>{p.abbr} — {p.name}</option>
              ))}
            </select>
            {programsErr && <span className="hint" style={{color:"#b91c1c"}}>Couldn't fetch programs: {programsErr}</span>}
            {!programsErr && <span className="hint">Drives the course list below.</span>}
          </div>
        </div>

        {/* Course — two dropdowns that share a single selection. Both pull
             from courses (the program's course list). Users can pick by code
             or by name — picking either updates courseId, which drives every
             downstream display. Both disabled until a program is selected. */}
        <div className="card">
          <div className="clabel">Course</div>
          <div className="field">
            <label htmlFor="code">Course code</label>
            <select id="code"
              value={courseId}
              disabled={!programAbbr || coursesLoading || !!coursesErr}
              onChange={e=>{setCourseId(e.target.value);clearStatus();}}
              className={courseId ? "ok" : ""}>
              <option value="">{
                !programAbbr ? "— Select a program first —" :
                coursesLoading ? "Loading courses…" :
                coursesErr ? "Failed to load" :
                courses.length === 0 ? "No courses in this program" :
                "— Select —"
              }</option>
              {courses.map(c => (
                <option key={c.progCourseId} value={c.progCourseId}>{c.code} — {c.name}</option>
              ))}
            </select>
          </div>
          <div className="field">
            <label htmlFor="cname">Course name</label>
            <select id="cname"
              value={courseId}
              disabled={!programAbbr || coursesLoading || !!coursesErr}
              onChange={e=>{setCourseId(e.target.value);clearStatus();}}
              className={courseId ? "ok" : ""}>
              <option value="">{
                !programAbbr ? "— Select a program first —" :
                coursesLoading ? "Loading courses…" :
                coursesErr ? "Failed to load" :
                courses.length === 0 ? "No courses in this program" :
                "— Select —"
              }</option>
              {coursesByName.map(c => (
                <option key={c.progCourseId} value={c.progCourseId}>{c.name} ({c.code})</option>
              ))}
            </select>
            {coursesErr && <span className="hint" style={{color:"#b91c1c"}}>Couldn't fetch courses: {coursesErr}</span>}
            {!coursesErr && <span className="hint">Picking either dropdown selects the same course.</span>}
          </div>
        </div>

        {/* Document type */}
        <div className="card">
          <div className="clabel">Document type</div>
          <div className="type-grid">
            {DOC_TYPES.map(dt=>(
              <button key={dt.id}
                className={`tbtn${docType===dt.id&&dt.available?" sel":""}`}
                onClick={()=>dt.available&&setDocType(dt.id)}
                disabled={!dt.available} aria-pressed={docType===dt.id}>
                <div className="tn">{dt.name}</div>
                <div className="tf">{dt.full}</div>
                <div className="ts"><span className={`pill ${dt.available?"pill-g":"pill-gray"}`}>{dt.available?"Available":"Coming soon"}</span></div>
              </button>
            ))}
          </div>
        </div>

        {/* Action card */}
        <div className="card">

          {/* Confirm summary */}
          {confirmRows && (
            <div className="confirm fade">
              {confirmRows.map(([k,v],i)=>(
                <div key={k} className="crow" style={{marginBottom:i===confirmRows.length-1?0:3}}>
                  <span className="ck">{k}</span><span className="cv">{v}</span>
                </div>
              ))}
            </div>
          )}

          {/* Progress pipeline */}
          {phase==="running" && (
            <div className="pipeline fade">
              <div className="pbar-bg"><div className="pbar-fill" style={{width:`${pct}%`}}/></div>
              <div className="psteps">
                {STEPS.map((s,i)=>(
                  <div key={i} className={`pstep${i<stepIdx?" done":i===stepIdx?" act":""}`}>
                    <div className="pdot"/>
                    <div className="plabel">{s.label}</div>
                  </div>
                ))}
              </div>
              <div className="pmsg">{stepIdx>=0&&stepIdx<STEPS.length?STEPS[stepIdx].label+"…":"Processing…"}</div>
            </div>
          )}

          {/* Error */}
          {phase==="error" && (
            <div className="err-box fade">
              <strong>Export failed:</strong> {errMsg}
              <span className="retry" onClick={clearStatus}>Try again</span>
            </div>
          )}

          {/* Debug panel — always visible when there are logs */}
          {debugLog.length > 0 && (
            <div style={{marginBottom:"1rem"}}>
              <button
                onClick={()=>setShowDebug(v=>!v)}
                style={{fontSize:11,color:"#64748b",background:"none",border:"0.5px solid #e2e8f0",borderRadius:6,padding:"3px 10px",cursor:"pointer",marginBottom:4}}>
                {showDebug ? "▲ Hide" : "▼ Show"} debug log ({debugLog.length} entries)
              </button>
              {showDebug && (
                <div style={{background:"#0f172a",borderRadius:8,padding:"10px 12px",fontFamily:"monospace",fontSize:11,color:"#94a3b8",lineHeight:1.6,maxHeight:200,overflowY:"auto"}}>
                  {debugLog.map((l,i)=>(
                    <div key={i} style={{color: l.includes("error") || l.includes("Error") ? "#f87171" : l.includes("complete") || l.includes("Got") ? "#34d399" : "#94a3b8"}}>
                      {l}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Main action button — three states:
                idle/ready  → "Export from CODA"         (triggers export)
                running     → "Building your Doc"        (disabled)
                done        → "Success! Please Save…"    (triggers save, light green)
                saved       → "✓ Saved!"                 (disabled) */}
          {(() => {
            const mainClass =
              "export-btn" +
              (phase === "done" && !saved ? " success" : "") +
              (saved ? " saved" : "");

            let onClick = doExport;
            let disabled = !canExport;
            let content;

            if (phase === "running") {
              content = <><BuildingIcon/> Building your Doc…</>;
              disabled = true;
            } else if (saved) {
              content = <>✓ Saved!</>;
              disabled = true;
            } else if (phase === "done" && docxBytes) {
              content = <><span style={{fontSize:"17px"}}>👍</span> Success! Please Save Your Doc</>;
              onClick = doSave;
              disabled = false;
            } else {
              content = <><ArrowUpIcon/> Export from CODA</>;
            }

            return (
              <button className={mainClass} onClick={onClick} disabled={disabled}>
                {content}
              </button>
            );
          })()}

        </div>

        {/* Architecture link */}
        <a href="./architecture.html" className="arch-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 3h10M2 7h10M2 11h6" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
          </svg>
          View architecture
        </a>

        <div className="footer">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5.5" stroke="currentColor" strokeWidth=".8"/><path d="M6 5v3.5M6 4v-.5" stroke="currentColor" strokeWidth=".9" strokeLinecap="round"/></svg>
          Pick a program first, then a course. Both dropdowns point at the same selection.
        </div>

      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
