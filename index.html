<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCW Document Exporter</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:    #ffffff;
      --bg-secondary:  #f5f5f3;
      --bg-info:       #e6f1fb;
      --bg-success:    #eaf3de;
      --bg-danger:     #fcebeb;
      --text-primary:  #111111;
      --text-secondary:#555555;
      --text-tertiary: #aaaaaa;
      --text-info:     #0c447c;
      --text-success:  #3b6d11;
      --text-danger:   #a32d2d;
      --border-subtle: rgba(0,0,0,0.10);
      --border-medium: rgba(0,0,0,0.22);
      --border-info:   #85b7eb;
      --border-success:#97c459;
      --border-danger: #f09595;
      --radius-md:     8px;
      --radius-lg:     12px;
      --font:          'DM Sans', system-ui, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary:    #1c1c1e;
        --bg-secondary:  #2c2c2e;
        --bg-info:       #042c53;
        --bg-success:    #173404;
        --bg-danger:     #501313;
        --text-primary:  #f0f0f0;
        --text-secondary:#aaaaaa;
        --text-tertiary: #666666;
        --text-info:     #85b7eb;
        --text-success:  #c0dd97;
        --text-danger:   #f09595;
        --border-subtle: rgba(255,255,255,0.10);
        --border-medium: rgba(255,255,255,0.22);
        --border-info:   #185fa5;
        --border-success:#3b6d11;
        --border-danger: #a32d2d;
      }
    }

    html, body { height: 100%; background: var(--bg-secondary); }

    body {
      font-family: var(--font);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    #root { min-height: 100vh; }

    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap');

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .fade-in { animation: fadeIn 0.2s ease forwards; }

    input[type="text"] {
      width: 100%;
      height: 36px;
      padding: 0 10px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-family: var(--font);
      color: var(--text-primary);
      background: var(--bg-primary);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }
    input[type="text"]:focus {
      box-shadow: 0 0 0 3px rgba(55,138,221,0.18);
    }
    input[type="text"]::placeholder { color: var(--text-tertiary); }

    button { font-family: var(--font); }

    .doc-btn:hover:not(:disabled) {
      border-color: var(--border-info) !important;
      background: var(--bg-info) !important;
    }

    .export-btn:hover:not(:disabled) { opacity: 0.82; }
    .export-btn:active:not(:disabled) { transform: scale(0.98); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const WGUOwl = () => (
      <svg width="38" height="38" viewBox="0 0 80 80" fill="none" aria-label="WGU owl logo">
        <ellipse cx="40" cy="44" rx="24" ry="22" fill="#185FA5"/>
        <ellipse cx="40" cy="42" rx="20" ry="18" fill="#378ADD"/>
        <ellipse cx="31" cy="36" rx="8" ry="9" fill="#fff"/>
        <ellipse cx="49" cy="36" rx="8" ry="9" fill="#fff"/>
        <ellipse cx="31" cy="37" rx="5.5" ry="6" fill="#0C447C"/>
        <ellipse cx="49" cy="37" rx="5.5" ry="6" fill="#0C447C"/>
        <ellipse cx="31" cy="37" rx="3" ry="3.5" fill="#fff"/>
        <ellipse cx="49" cy="37" rx="3" ry="3.5" fill="#fff"/>
        <ellipse cx="31.8" cy="36.2" rx="1.2" ry="1.2" fill="#0C447C"/>
        <ellipse cx="49.8" cy="36.2" rx="1.2" ry="1.2" fill="#0C447C"/>
        <path d="M37 47 Q40 50 43 47" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" fill="none"/>
        <path d="M38 45 L40 47 L42 45" fill="#FAEEDA" stroke="#E6A020" strokeWidth="0.5"/>
        <ellipse cx="22" cy="30" rx="5" ry="7" fill="#185FA5" transform="rotate(-20 22 30)"/>
        <ellipse cx="58" cy="30" rx="5" ry="7" fill="#185FA5" transform="rotate(20 58 30)"/>
        <path d="M28 58 Q40 65 52 58" fill="#185FA5"/>
        <ellipse cx="32" cy="58" rx="4" ry="3" fill="#0C447C"/>
        <ellipse cx="48" cy="58" rx="4" ry="3" fill="#0C447C"/>
      </svg>
    );

    const CheckIcon = () => (
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{flexShrink:0}}>
        <circle cx="7" cy="7" r="7" fill="currentColor" opacity="0.2"/>
        <path d="M4 7l2 2 4-4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    );

    const InfoIcon = () => (
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" style={{flexShrink:0}}>
        <circle cx="6.5" cy="6.5" r="6" stroke="currentColor" strokeWidth="0.8"/>
        <path d="M6.5 5.5v4M6.5 4.5v-.5" stroke="currentColor" strokeWidth="1" strokeLinecap="round"/>
      </svg>
    );

    const Spinner = () => (
      <div style={{
        width:16, height:16, borderRadius:"50%",
        border:"2px solid var(--border-subtle)",
        borderTopColor:"var(--text-info)",
        animation:"spin 0.7s linear infinite",
        flexShrink:0
      }}/>
    );

    const DOC_TYPES = [
      { id:"CCW",  name:"CCW",  full:"Course Competency Worksheet", available:true  },
      { id:"SSD",  name:"SSD",  full:"Scope & Sequence Doc",        available:false },
      { id:"CSBD", name:"CSBD", full:"Course Summary / Brief",      available:false },
    ];

    function Pill({ variant, children }) {
      const styles = {
        green: { background:"var(--bg-success)",   color:"var(--text-success)"   },
        blue:  { background:"var(--bg-info)",      color:"var(--text-info)"      },
        gray:  { background:"var(--bg-secondary)", color:"var(--text-secondary)" },
      };
      return (
        <span style={{
          display:"inline-flex", alignItems:"center", gap:5,
          fontSize:12, fontWeight:500, borderRadius:20, padding:"3px 10px",
          whiteSpace:"nowrap",
          ...styles[variant]
        }}>
          {children}
        </span>
      );
    }

    function Card({ children, style }) {
      return (
        <div style={{
          background:"var(--bg-primary)",
          border:"0.5px solid var(--border-subtle)",
          borderRadius:"var(--radius-lg)",
          padding:"1.25rem 1.5rem",
          margin:"1rem 1.5rem 0",
          ...style
        }}>
          {children}
        </div>
      );
    }

    function SectionLabel({ children }) {
      return (
        <div style={{
          fontSize:11, fontWeight:500, textTransform:"uppercase",
          letterSpacing:"0.06em", color:"var(--text-secondary)", marginBottom:"1rem"
        }}>
          {children}
        </div>
      );
    }

    function Field({ label, hint, htmlFor, children, optional }) {
      return (
        <div style={{display:"flex", flexDirection:"column", gap:6}}>
          <label htmlFor={htmlFor} style={{fontSize:13, fontWeight:500, color:"var(--text-primary)"}}>
            {label}
            {optional && <span style={{fontWeight:400, color:"var(--text-secondary)"}}> (optional)</span>}
          </label>
          {children}
          {hint && <span style={{fontSize:12, color:"var(--text-secondary)"}}>{hint}</span>}
        </div>
      );
    }

    function StyledInput({ id, placeholder, value, onChange, hasValue }) {
      return (
        <input
          id={id}
          type="text"
          placeholder={placeholder}
          value={value}
          onChange={onChange}
          style={{
            border: `0.5px solid ${hasValue ? "var(--border-success)" : "var(--border-medium)"}`,
          }}
        />
      );
    }

    function App() {
      const [docId,       setDocId]       = useState("4YIajnJqvo");
      const [courseCode,  setCourseCode]  = useState("");
      const [courseName,  setCourseName]  = useState("");
      const [selectedType,setSelectedType]= useState("CCW");
      const [status,      setStatus]      = useState(null);
      const [statusMsg,   setStatusMsg]   = useState("");

      const effectiveDocId = docId.trim() || "4YIajnJqvo";
      const cleanCode      = courseCode.trim().toUpperCase();
      const cleanName      = courseName.trim();
      const hasInput       = cleanCode.length > 0 || cleanName.length > 2;
      const docCustom      = docId.trim() && docId.trim() !== "4YIajnJqvo";

      const selectedTypeFull = DOC_TYPES.find(d => d.id === selectedType)?.full ?? "";

      const confirmRows = hasInput ? [
        ["Doc",    `Design & Development V3 (${effectiveDocId})`],
        ["Course", cleanCode + (cleanName ? ` – ${cleanName.length > 52 ? cleanName.slice(0,52)+"…" : cleanName}` : "")],
        ["Type",   `${selectedType} (${selectedTypeFull})`],
        ["Output", `${cleanCode || "COURSE"}_${selectedType}.docx`],
      ] : null;

      function handleExport() {
        if (!hasInput) return;
        const codes = cleanCode.split(",").map(c => c.trim()).filter(Boolean);
        const isBatch = codes.length > 1;

        setStatus("progress");
        setStatusMsg(isBatch ? "Sending batch export request…" : "Looking up course in Coda…");

        const prompt = isBatch
          ? `Export CCWs for ${codes.join(", ")} from doc ${effectiveDocId}`
          : codes[0]
            ? `Export a ${selectedType} for ${codes[0]} from doc ${effectiveDocId}`
            : `Export a ${selectedType} for a course named "${cleanName}" from doc ${effectiveDocId}`;

        setTimeout(() => {
          setStatus("success");
          setStatusMsg(
            isBatch
              ? `Requested ${selectedType} exports for: ${codes.join(", ")}. Claude will process them one at a time.`
              : `Export request sent for ${codes[0] || `"${cleanName}"`}. Claude is fetching data and building your ${selectedType} now.`
          );
        }, 700);

        if (typeof sendPrompt === "function") sendPrompt(prompt);
      }

      return (
        <div style={{maxWidth:660, margin:"0 auto", paddingBottom:"3rem"}}>

          {/* ── Header ── */}
          <div style={{
            background:"var(--bg-primary)",
            borderBottom:"0.5px solid var(--border-subtle)",
            padding:"0 1.5rem",
            display:"flex", alignItems:"center", gap:14, height:60,
          }}>
            <WGUOwl/>
            <div style={{flex:1}}>
              <div style={{fontSize:15, fontWeight:500, color:"var(--text-primary)", lineHeight:1.2}}>
                CCW Document Exporter
              </div>
              <div style={{fontSize:12, color:"var(--text-secondary)", marginTop:1}}>
                Design &amp; Development V3
              </div>
            </div>
            <Pill variant="blue">CCW available</Pill>
          </div>

          {/* ── Page title ── */}
          <div style={{padding:"1.75rem 1.5rem 0.5rem"}}>
            <h1 style={{fontSize:22, fontWeight:500, color:"var(--text-primary)"}}>
              Export a course document
            </h1>
            <p style={{fontSize:14, color:"var(--text-secondary)", marginTop:4, lineHeight:1.5}}>
              Enter a course code or name to generate a formatted Word document from Coda data.
            </p>
          </div>

          {/* ── Coda connection ── */}
          <Card>
            <SectionLabel>Coda connection</SectionLabel>
            <Field label="Coda doc ID" htmlFor="doc-id" hint="Leave as-is for Design & Development V3">
              <div style={{display:"flex", gap:8, alignItems:"center"}}>
                <StyledInput
                  id="doc-id"
                  placeholder="4YIajnJqvo"
                  value={docId}
                  onChange={e => setDocId(e.target.value)}
                  hasValue={docCustom}
                />
                <Pill variant={docCustom ? "blue" : "green"}>{docCustom ? "Custom" : "Default"}</Pill>
              </div>
            </Field>
          </Card>

          {/* ── Course ── */}
          <Card>
            <SectionLabel>Course</SectionLabel>
            <div style={{display:"flex", flexDirection:"column", gap:"1rem"}}>
              <Field label="Course code" htmlFor="course-code">
                <StyledInput
                  id="course-code"
                  placeholder="D946"
                  value={courseCode}
                  onChange={e => { setCourseCode(e.target.value); setStatus(null); }}
                  hasValue={cleanCode.length > 0}
                />
              </Field>
              <Field label="Course name" optional htmlFor="course-name"
                hint="If code is unknown, Claude can search by name">
                <StyledInput
                  id="course-name"
                  placeholder="Chronic Care Across the Lifespan…"
                  value={courseName}
                  onChange={e => { setCourseName(e.target.value); setStatus(null); }}
                  hasValue={cleanName.length > 0}
                />
              </Field>
            </div>
          </Card>

          {/* ── Document type ── */}
          <Card>
            <SectionLabel>Document type</SectionLabel>
            <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8}}>
              {DOC_TYPES.map(dt => (
                <button
                  key={dt.id}
                  className="doc-btn"
                  onClick={() => dt.available && setSelectedType(dt.id)}
                  disabled={!dt.available}
                  aria-pressed={selectedType === dt.id}
                  style={{
                    border: selectedType === dt.id && dt.available
                      ? "1.5px solid var(--border-info)"
                      : "0.5px solid var(--border-medium)",
                    borderRadius:"var(--radius-md)",
                    padding:"10px 12px",
                    cursor: dt.available ? "pointer" : "not-allowed",
                    background: selectedType === dt.id && dt.available
                      ? "var(--bg-info)" : "var(--bg-primary)",
                    textAlign:"left",
                    opacity: dt.available ? 1 : 0.42,
                    transition:"border-color 0.15s, background 0.15s",
                  }}
                >
                  <div style={{fontSize:13, fontWeight:500, color:"var(--text-primary)"}}>{dt.name}</div>
                  <div style={{fontSize:11, color:"var(--text-secondary)", marginTop:2}}>{dt.full}</div>
                  <div style={{marginTop:6}}>
                    <Pill variant={dt.available ? "green" : "gray"}>
                      {dt.available ? "Available" : "Coming soon"}
                    </Pill>
                  </div>
                </button>
              ))}
            </div>
          </Card>

          {/* ── Export card ── */}
          <Card>
            {/* Confirm summary */}
            {confirmRows && (
              <div className="fade-in" style={{
                background:"var(--bg-info)",
                border:"0.5px solid var(--border-info)",
                borderRadius:"var(--radius-md)",
                padding:"12px 14px", marginBottom:"1rem"
              }}>
                {confirmRows.map(([k, v]) => (
                  <div key={k} style={{display:"flex", alignItems:"baseline", gap:8, marginBottom: k==="Output" ? 0 : 4}}>
                    <span style={{fontSize:12, color:"var(--text-info)", fontWeight:500, minWidth:80}}>{k}</span>
                    <span style={{fontSize:13, color:"var(--text-info)", fontWeight:500}}>{v}</span>
                  </div>
                ))}
              </div>
            )}

            {/* Status messages */}
            {status === "error" && (
              <div className="fade-in" style={{
                background:"var(--bg-danger)", border:"0.5px solid var(--border-danger)",
                borderRadius:"var(--radius-md)", padding:"10px 14px",
                marginBottom:"0.75rem", fontSize:13, color:"var(--text-danger)"
              }}>
                {statusMsg}
              </div>
            )}

            {status === "progress" && (
              <div className="fade-in" style={{
                display:"flex", alignItems:"center", gap:10, marginBottom:"0.75rem"
              }}>
                <Spinner/>
                <span style={{fontSize:13, color:"var(--text-secondary)"}}>{statusMsg}</span>
              </div>
            )}

            {status === "success" && (
              <div className="fade-in" style={{
                background:"var(--bg-success)", border:"0.5px solid var(--border-success)",
                borderRadius:"var(--radius-md)", padding:"12px 14px", marginBottom:"0.75rem"
              }}>
                <div style={{fontSize:13, fontWeight:500, color:"var(--text-success)", marginBottom:6, display:"flex", alignItems:"center", gap:6}}>
                  <CheckIcon/> Export request sent
                </div>
                <div style={{fontSize:12, color:"var(--text-success)"}}>{statusMsg}</div>
              </div>
            )}

            {/* Export button */}
            <button
              className="export-btn"
              onClick={handleExport}
              disabled={!hasInput}
              style={{
                width:"100%", height:40, borderRadius:"var(--radius-md)",
                border:"0.5px solid var(--border-info)",
                fontSize:14, fontWeight:500,
                cursor: hasInput ? "pointer" : "not-allowed",
                display:"flex", alignItems:"center", justifyContent:"center", gap:8,
                background:"var(--bg-info)", color:"var(--text-info)",
                opacity: hasInput ? 1 : 0.35,
                transition:"opacity 0.15s, transform 0.1s",
              }}
            >
              Export document ↗
            </button>
          </Card>

          {/* ── Footer ── */}
          <div style={{
            margin:"1rem 1.5rem 0", fontSize:12,
            color:"var(--text-tertiary)",
            display:"flex", alignItems:"center", gap:6
          }}>
            <InfoIcon/>
            Multiple courses? Use a comma-separated list — e.g. D945, D946, D947
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
