name = "ccw-exporter"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
# Set ALLOWED_ORIGIN to your GitHub Pages URL after deploying
# e.g. https://kpunches.github.io
# Set ANTHROPIC_API_KEY and CODA_API_TOKEN as Secrets (never plain vars):
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put CODA_API_TOKEN
ALLOWED_ORIGIN = "https://kpunches.github.io"
